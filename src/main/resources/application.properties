# Nombre de la aplicacion en el ecosistema Spring.
spring.application.name=bookit-backend

# Puerto HTTP del backend.
server.port=${PORT:3000}

# Configuracion de datasource (variables inyectadas por Docker Compose).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bookit}
spring.datasource.username=${POSTGRES_USER:bookit}
spring.datasource.password=${POSTGRES_PASSWORD:bookit}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion JPA/Hibernate.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
