services:
  # Base de datos relacional con persistencia.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookit}
      POSTGRES_USER: ${POSTGRES_USER:-bookit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookit} -d ${POSTGRES_DB:-bookit}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # API Spring Boot.
  backend:
    image: ${DOCKERHUB_USER:-youruser}/bookit-backend:latest
    build:
      context: .
    environment:
      PORT: 3000
      POSTGRES_USER: ${POSTGRES_USER:-bookit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookit}
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-bookit}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # Frontend Angular servido en Nginx.
  frontend:
    image: ${DOCKERHUB_USER:-youruser}/bookit-frontend:latest
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  # Volumen para conservar datos aunque se reinicien contenedores.
  postgres_data:
